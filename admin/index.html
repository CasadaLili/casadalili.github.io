<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa da Lili — Editor</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script>
      // Cross-domain setup: this admin page lives on github.io
      // but Identity + Git Gateway run on a Netlify project (casadalili-cms).
      //
      // The widget script auto-calls init() with no args on DOMContentLoaded,
      // which defaults APIUrl to location.origin/.netlify/identity (= github.io,
      // which 404s). It also auto-opens with no args when the URL contains an
      // #invite_token=... fragment, before any DOMContentLoaded handler we
      // could register fires.
      //
      // Robust fix: monkey-patch netlifyIdentity.init() right after the widget
      // script loads, so EVERY call to init (the widget's own auto-init, plus
      // any later call from Decap CMS) always receives our cross-domain APIUrl.
      (function() {
        var IDENTITY_API = "https://casadalili-cms.netlify.app/.netlify/identity";
        var ni = window.netlifyIdentity;
        if (!ni || typeof ni.init !== "function") return;
        var originalInit = ni.init;
        ni.init = function(options) {
          options = options || {};
          options.APIUrl = IDENTITY_API;
          return originalInit.call(ni, options);
        };
        ni.on("init", function(user) {
          if (!user) {
            ni.on("login", function() {
              document.location.href = "/admin/";
            });
          }
        });
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
