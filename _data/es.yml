about_me:
  meta_title: "Sobre Mí — Casa da Lili"
  meta_description: "Conozca a la persona que da la bienvenida en Casa da Lili."
  title: "Sobre Mí"
  subtitle: "Conozca a la persona que da la bienvenida en Casa da Lili"
  portrait: "img/meditation-chakras.jpg"
  portrait_alt: "Lili en meditación"
  paragraphs:
    - >-
      Casa da Lili nació del deseo de crear un espacio sencillo, donde sea
      posible desacelerar, respirar y volver a uno mismo.


      Soy Lili, terapeuta holística, y a lo largo de mi camino fui aprendiendo
      que el verdadero cuidado comienza en la escucha — del cuerpo, las
      emociones y el ritmo de cada persona.
    - "Mi propio viaje me trajo hasta aquí. Entre desafíos, pausas y transformaciones, fui comprendiendo la importancia de crear un lugar donde no es necesario 'hacer' — solo estar. Un espacio donde se puede llegar tal como se está, sin expectativas."
    - >-
      En Casa da Lili, recibo a cada persona de forma individual, en un
      ambiente de calma y tranquilidad, donde el acompañamiento se ofrece con
      presencia, sensibilidad y respeto por el tiempo de cada uno.


      Creo que el cuidado comienza en una presencia simple, en una mirada
      atenta, en un gesto que no tiene prisa. Eso es lo que intento ofrecer en
      cada estancia.


      Este es un lugar donde puede aterrizar, respirar y, poco a poco, volver
      a casa — dentro de sí mismo.
  closing: "Con cariño,\nLili"
