about_me:
  meta_title: Sobre Mim — Casa da Lili
  meta_description: Conheça quem acolhe na Casa da Lili.
  title: Sobre Mim
  subtitle: Conheça quem acolhe na Casa da Lili
  portrait: img/meditation-chakras.jpg
  portrait_alt: Lili em meditação
  paragraphs:
    - >-
      A Casa da Lili nasceu do desejo de criar um espaço simples, onde seja
      possível abrandar, respirar e voltar a si.


      Sou a Lili, terapeuta holística, e ao longo do meu percurso fui aprendendo que o verdadeiro cuidado começa na escuta — do corpo, das emoções e do ritmo de cada pessoa.
    - A minha própria jornada trouxe-me até aqui. Entre desafios, pausas e
      transformações, fui percebendo a importância de criar um lugar onde não é
      preciso “fazer”, apenas estar. Um espaço onde se pode chegar como se está,
      sem expectativas.
    - >-
      Na Casa da Lili, recebo cada pessoa de forma individual, num ambiente de
      partilha tranquila, onde o acompanhamento é feito com presença,
      sensibilidade e respeito pelo tempo de cada um.


      Acredito que cuidar começa numa presença simples, num olhar atento, num gesto que não tem pressa. É isso que tento oferecer em cada estadia.


      Este é um lugar onde pode pousar, respirar e, aos poucos, voltar a casa — dentro de si.
  closing: |-
    Com carinho,
    Lili
