therapies:
  title: "Nos Thérapies"
  lead: "Chaque séance est choisie avec la personne, selon ses besoins et ses préférences."
  items:
    - icon: "✦"
      title: "Reiki"
      description: "Technique japonaise de guérison énergétique qui favorise l'équilibre physique, émotionnel et spirituel par la canalisation de l'énergie par les mains."
    - icon: "◈"
      title: "Massage Ayurvédique"
      description: "Massage thérapeutique ancré dans la médecine traditionnelle indienne, utilisant des huiles chaudes et des mouvements spécifiques pour libérer les tensions."
    - icon: "⬡"
      title: "Thérapie Multidimensionnelle"
      description: "Approche holistique qui travaille différents niveaux énergétiques, intégrant corps, esprit et émotions pour favoriser une guérison profonde."
    - icon: "❧"
      title: "Yoga et Respiration"
      description: "Pratiques douces de mouvement et de respiration qui apaisent le système nerveux et favorisent la conscience corporelle et la présence."
    - icon: "◎"
      title: "Méditation"
      description: "Pratique guidée de pleine conscience qui cultive la sérénité intérieure, la clarté mentale et la capacité d'observer sans jugement."

testimonials:
  title: "Voix de Nos Invitées"
  items:
    - text: "Ce fut une expérience qui m'a rendu à moi-même. Le silence, la nature, la chaleur de tout cela… tout avait un sens. Je suis repartie plus légère, avec une clarté que je n'avais pas eue depuis des mois."
      cite: "Invitée, Programme de 2 Jours"
    - text: "Je n'aurais jamais cru que trois jours pouvaient changer autant ma perspective. L'attention avec laquelle j'ai été reçue était différente de tout ce que je connaissais."
      cite: "Invitée, Programme de 3 Jours"
    - text: "Je suis venue me reposer et je suis repartie avec un sentiment de profond renouveau. L'équilibre entre les thérapies, la nature et le silence était parfait."
      cite: "Invitée, Programme de 1 Jour"

approach:
  title: "Notre Approche"
  paragraphs:
    - "À Casa da Lili, le bien-être est accueilli de façon simple, humaine et personnalisée. La nature environnante, le silence de la maison, la vue sur l'Atlantique et le rythme apaisé du séjour font partie intégrante de l'expérience."
    - "L'accompagnement thérapeutique se déroule avec écoute, présence et respect du moment de chaque personne. Plus qu'un programme fixe, c'est une invitation au soin conscient."
  highlight: "Casa da Lili ne suit pas un format rigide ni de masse. Chaque séjour se vit de façon intime, simple et adapté au moment de vie de chaque invité."

quote_banner:
  text: "Prendre soin de soi n'est pas un luxe. C'est le commencement de tout."

