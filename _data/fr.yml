about:
  title: "Bienvenue à Casa da Lili"
  lead: "Ce programme a été conçu pour ceux qui ressentent le besoin de ralentir, de se reposer et de prendre soin d'eux de façon plus consciente."
  body: "Tout au long du séjour, chaque personne est accueillie à son propre rythme, avec de l'espace pour le silence, la nature, le repos et l'accompagnement thérapeutique. L'expérience réunit des moments simples mais profondément significatifs : repos, promenades dans la nature, alimentation soignée, pratiques de présence et thérapies adaptées aux besoins de chacun."

place:
  title: "Le Lieu"
  image: "img/terrace-lavender.jpg"
  image_alt: "Terrasse avec lavande et vue sur la mer"
  fragments:
    - heading: "Entre la montagne et la mer"
      text: "La maison se trouve dans un village tranquille, entourée de nature et à quelques minutes de l'Atlantique."
    - heading: "Un rythme différent"
      text: "Ici, le temps ralentit. Il n'y a pas d'agenda imposé — seulement la présence."
    - heading: "Le silence qui restaure"
      text: "Le silence de la maison n'est pas le vide — c'est le commencement de quelque chose."

gallery:
  title: "La Maison"
  prev_label: "Précédent"
  next_label: "Suivant"

audience:
  title: "Pour Qui Est Ce Programme ?"
  cards:
    - heading: "Épuisement"
      text: "Pour ceux qui vivent un épuisement professionnel ou un burnout et ont besoin d'une véritable pause."
    - heading: "Transition"
      text: "Pour ceux qui traversent des changements de vie — carrière, relations, deuil — et ont besoin d'espace pour se recentrer."
    - heading: "Fatigue Émotionnelle"
      text: "Pour ceux qui portent le poids accumulé du quotidien et souhaitent relâcher la tension de façon consciente."
    - heading: "Reconnexion"
      text: "Pour ceux qui ressentent simplement que le moment est venu de prendre soin d'eux avec plus de présence et de profondeur."

day:
  title: "Une Journée Ici"
  steps:
    - time: "Matin"
      heading: "Arrivée et accueil"
      text: "Votre pause commence par une conversation tranquille, un petit-déjeuner fait maison et tout le temps nécessaire pour vous installer sans hâte."
      image: "img/house-entrance.jpg"
      image_alt: "Entrée de la maison"
    - time: "Milieu de Matinée"
      heading: "Mouvement et respiration"
      text: "Une douce pratique de yoga ou de respiration sur la terrasse — avec la vue sur la mer en toile de fond."
      image: "img/elixir-bottle.jpg"
      image_alt: "Flacon d'élixir avec lavande, bougie et cristaux"
    - time: "Après-midi"
      heading: "Promenade dans la nature"
      text: "Un parcours tranquille sur les chemins du village ou le long du littoral. Sans destination imposée."
      image: "img/nature-walk.jpg"
      image_alt: "Promenade sur des chemins pavés dans la nature"
    - time: "Fin d'Après-midi"
      heading: "Séance thérapeutique"
      text: "Un moment rien que pour vous — Reiki, massage, thérapie ou méditation, selon ce dont vous avez besoin."
      image: "img/therapy-session.jpg"
      image_alt: "Séance thérapeutique dans un cadre chaleureux"
    - time: "Soirée"
      heading: "Dîner et recueillement"
      text: "Un repas soigné, puis le silence. La maison vous accueille tandis que la journée se termine."
      image: "img/interior-lounge.jpg"
      image_alt: "Salon"

