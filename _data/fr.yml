about_me:
  meta_title: "Sur Moi — Casa da Lili"
  meta_description: "Découvrez la personne qui vous accueille à Casa da Lili."
  title: "Sur Moi"
  subtitle: "Découvrez la personne qui vous accueille à Casa da Lili"
  portrait: "img/meditation-chakras.jpg"
  portrait_alt: "Lili en méditation"
  paragraphs:
    - >-
      Casa da Lili est née du désir de créer un espace simple, où il est
      possible de ralentir, de respirer et de revenir à soi.


      Je suis Lili, thérapeute holistique, et au fil de mon chemin j'ai appris
      que le véritable soin commence dans l'écoute — du corps, des émotions et
      du rythme de chaque personne.
    - "Mon propre parcours m'a amenée jusqu'ici. Entre défis, pauses et transformations, j'ai compris l'importance de créer un lieu où il n'est pas nécessaire de « faire » — juste être. Un espace où l'on peut arriver tel que l'on est, sans attentes."
    - >-
      À Casa da Lili, j'accueille chaque personne individuellement, dans une
      atmosphère de calme et de partage tranquille, où l'accompagnement est
      offert avec présence, sensibilité et respect du rythme de chacun.


      Je crois que le soin commence dans une présence simple, un regard attentif,
      un geste qui ne se précipite pas. C'est ce que j'essaie d'offrir à chaque
      séjour.


      C'est un lieu où vous pouvez atterrir, respirer et, peu à peu, rentrer
      chez vous — en vous-même.
  closing: "Avec tendresse,\nLili"
