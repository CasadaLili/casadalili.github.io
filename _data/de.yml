therapies:
  title: "Unsere Therapien"
  lead: "Jede Sitzung wird gemeinsam mit dem Gast ausgewählt, basierend auf seinen Bedürfnissen und Vorlieben."
  items:
    - icon: "✦"
      title: "Reiki"
      description: "Eine japanische Energieheilungstechnik, die durch die Kanalisierung von Energie über die Hände das körperliche, emotionale und spirituelle Gleichgewicht fördert."
    - icon: "◈"
      title: "Ayurvedische Massage"
      description: "Eine therapeutische Massage, die in der traditionellen indischen Medizin verwurzelt ist und warme Öle sowie spezifische Bewegungen verwendet, um Spannungen zu lösen."
    - icon: "⬡"
      title: "Multidimensionale Therapie"
      description: "Ein ganzheitlicher Ansatz, der auf verschiedenen Energieebenen arbeitet und Körper, Geist und Emotionen integriert, um tiefe Heilung zu fördern."
    - icon: "❧"
      title: "Yoga und Atemarbeit"
      description: "Sanfte Bewegungs- und Atemübungen, die das Nervensystem beruhigen und das Körperbewusstsein und die Präsenz fördern."
    - icon: "◎"
      title: "Meditation"
      description: "Geführte Achtsamkeitspraxis, die innere Ruhe, mentale Klarheit und die Fähigkeit zu urteilen ohne zu bewerten kultiviert."

testimonials:
  title: "Stimmen unserer Gäste"
  items:
    - text: "Es war eine Erfahrung, die mich zu mir selbst zurückgebracht hat. Die Stille, die Natur, die Wärme von allem… alles ergab Sinn. Ich ging leichter und mit einer Klarheit fort, die ich seit Monaten nicht mehr hatte."
      cite: "Gast, 2-Tages-Programm"
    - text: "Ich hätte nie gedacht, dass drei Tage meine Perspektive so tiefgreifend verändern könnten. Die Fürsorge, mit der ich empfangen wurde, war anders als alles, was ich kannte."
      cite: "Gast, 3-Tages-Programm"
    - text: "Ich kam zum Ausruhen und ging mit einem Gefühl tiefer Erneuerung. Das Gleichgewicht zwischen Therapien, Natur und Stille war perfekt."
      cite: "Gast, 1-Tages-Programm"

approach:
  title: "Unser Ansatz"
  paragraphs:
    - "In Casa da Lili wird Wohlbefinden auf einfache, menschliche und persönliche Weise empfangen. Die umgebende Natur, die Stille des Hauses, der Blick über den Atlantik und der entschleunigte Rhythmus des Aufenthalts sind wesentliche Teile der Erfahrung."
    - "Die therapeutische Begleitung erfolgt mit aufmerksamem Zuhören, Präsenz und Respekt für den Moment jeder Person. Mehr als ein festes Programm ist dies eine Einladung zur bewussten Fürsorge."
  highlight: "Casa da Lili folgt keinem starren oder massenproduzierten Format. Jeder Aufenthalt wird intim, einfach und angepasst an den Lebensmoment jedes Gastes erlebt."

quote_banner:
  text: "Für sich selbst zu sorgen ist kein Luxus. Es ist der Beginn von allem."

