about_me:
  meta_title: "Über Mich — Casa da Lili"
  meta_description: "Lernen Sie die Person kennen, die Sie in Casa da Lili willkommen heißt."
  title: "Über Mich"
  subtitle: "Lernen Sie die Person kennen, die Sie in Casa da Lili willkommen heißt"
  portrait: "img/meditation-chakras.jpg"
  portrait_alt: "Lili in Meditation"
  paragraphs:
    - >-
      Casa da Lili entstand aus dem Wunsch heraus, einen einfachen Raum zu
      schaffen, in dem es möglich ist, zu entschleunigen, zu atmen und zu sich
      selbst zurückzukehren.


      Ich bin Lili, ganzheitliche Therapeutin, und auf meinem Weg habe ich
      gelernt, dass echte Fürsorge im Zuhören beginnt — dem Körper, den
      Emotionen und dem Rhythmus jeder Person.
    - "Mein eigener Weg hat mich hierher geführt. Zwischen Herausforderungen, Pausen und Transformationen habe ich die Bedeutung erkannt, einen Ort zu schaffen, an dem man nicht 'tun' muss — nur sein. Einen Raum, an dem man genau so ankommen kann, wie man ist, ohne Erwartungen."
    - >-
      In Casa da Lili empfange ich jeden Menschen individuell, in einer
      Atmosphäre der Ruhe und des stillen Austauschs, in der die Begleitung mit
      Präsenz, Einfühlungsvermögen und Respekt vor dem Tempo jedes Einzelnen
      angeboten wird.


      Ich glaube, dass Fürsorge in einer einfachen Präsenz beginnt, einem
      aufmerksamen Blick, einer Geste ohne Eile. Das ist es, was ich bei jedem
      Aufenthalt anzubieten versuche.


      Dies ist ein Ort, an dem Sie landen, atmen und nach und nach nach Hause
      kommen können — in sich selbst.
  closing: "Mit Herzlichkeit,\nLili"
