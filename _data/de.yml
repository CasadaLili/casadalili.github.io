about:
  title: "Willkommen in Casa da Lili"
  lead: "Dieses Programm wurde für Menschen konzipiert, die das Bedürfnis verspüren, innezuhalten, sich auszuruhen und bewusster für sich zu sorgen."
  body: "Während des gesamten Aufenthalts wird jede Person in ihrem eigenen Tempo empfangen, mit Raum für Stille, Natur, Erholung und therapeutische Begleitung. Die Erfahrung verbindet einfache, aber zutiefst bedeutungsvolle Momente: Ruhe, Naturwanderungen, nährendes Essen, Achtsamkeitspraktiken und auf die Bedürfnisse jeder Person abgestimmte Therapien."

place:
  title: "Der Ort"
  image: "img/terrace-lavender.jpg"
  image_alt: "Terrasse mit Lavendel und Meerblick"
  fragments:
    - heading: "Zwischen Bergen und Meer"
      text: "Das Haus liegt in einem ruhigen Dorf, umgeben von Natur und nur wenige Minuten vom Atlantik entfernt."
    - heading: "Ein anderes Tempo"
      text: "Hier verlangsamt sich die Zeit. Es gibt keinen aufgezwungenen Zeitplan — nur Präsenz."
    - heading: "Stille, die erneuert"
      text: "Die Stille des Hauses ist keine Leere — sie ist der Beginn von etwas."

gallery:
  title: "Das Haus"
  prev_label: "Zurück"
  next_label: "Weiter"

audience:
  title: "Für Wen Ist Dieses Programm?"
  cards:
    - heading: "Erschöpfung"
      text: "Für Menschen, die unter beruflicher Erschöpfung oder Burnout leiden und eine echte Auszeit brauchen."
    - heading: "Lebensübergänge"
      text: "Für Menschen, die große Veränderungen durchleben — Karrierewechsel, Beziehungsende, Trauer — und Raum brauchen, um sich neu zu orientieren."
    - heading: "Emotionale Erschöpfung"
      text: "Für Menschen, die das angesammelte Gewicht des Alltags mit sich tragen und Spannungen auf achtsame Weise lösen möchten."
    - heading: "Wiederverbindung"
      text: "Für Menschen, die einfach das Gefühl haben, dass es an der Zeit ist, mit mehr Präsenz und Tiefe für sich selbst zu sorgen."

day:
  title: "Ein Tag Hier"
  steps:
    - time: "Morgen"
      heading: "Ankunft und Empfang"
      text: "Ihre Auszeit beginnt mit einem ruhigen Gespräch, einem selbstgemachten Frühstück und aller Zeit, die Sie brauchen, um ohne Eile anzukommen."
      image: "img/house-entrance.jpg"
      image_alt: "Hauseingang"
    - time: "Vormittag"
      heading: "Bewegung und Atem"
      text: "Eine sanfte Yoga- oder Atemübungseinheit auf der Terrasse — mit dem Meer als Kulisse."
      image: "img/elixir-bottle.jpg"
      image_alt: "Elixierflasche mit Lavendel, Kerze und Kristallen"
    - time: "Nachmittag"
      heading: "Spaziergang in der Natur"
      text: "Ein ruhiger Spaziergang auf den Wegen des Dorfes oder entlang der Küste. Ohne vorgegebenes Ziel."
      image: "img/nature-walk.jpg"
      image_alt: "Wanderung auf gepflasterten Naturpfaden"
    - time: "Später Nachmittag"
      heading: "Therapeutische Sitzung"
      text: "Ein Moment nur für Sie — Reiki, Massage, Therapie oder Meditation, je nach Ihren Bedürfnissen."
      image: "img/therapy-session.jpg"
      image_alt: "Therapeutische Sitzung in einer einladenden Umgebung"
    - time: "Abend"
      heading: "Abendessen und Stille"
      text: "Ein nährendes Mahl, und dann Stille. Das Haus hält Sie, während der Tag zu Ende geht."
      image: "img/interior-lounge.jpg"
      image_alt: "Wohnzimmer"

