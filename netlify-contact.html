<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><title>Casa da Lili — Formulário de Contacto</title></head>
<body>
<!-- This page exists solely so Netlify can detect and register the contact form.
     The actual UI lives on casadalili.github.io. Do not delete. -->
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact">
  <input name="bot-field">
  <input name="name">
  <input name="email">
  <input name="phone">
  <textarea name="message"></textarea>
</form>
</body>
</html>
